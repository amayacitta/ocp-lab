{{- if .Values.kubevirt.enabled }}
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: hco-operatorhub
  namespace: {{ .Values.kubevirt.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  source: redhat-operators
  sourceNamespace: openshift-marketplace
  name: kubevirt-hyperconverged
  #startingCSV: kubevirt-hyperconverged-operator.v4.20.11
  channel: {{ .Values.kubevirt.channel }}
  installPlanApproval: {{ .Values.kubevirt.installPlanApproval }}
{{- with .Values.kubevirt.config }} 
  config:
{{ toYaml . | indent 4 }}
{{ end }}   
{{ end -}}