{{- if .Values.certmanager.enabled }}
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: {{.Values.certmanager.ClusterIssuer.name | default "ocp-sub01-clusterissuer" }}
  namespace: cert-manager
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  ca:
    secretName: {{ .Values.certmanager.ClusterIssuer.secretName | default "ocp-sub01-tls-secret" }}
{{ end -}}