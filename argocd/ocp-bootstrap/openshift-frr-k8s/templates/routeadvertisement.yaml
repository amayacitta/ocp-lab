{{- if .Values.frr.enabled }}
## not namespaced
apiVersion: k8s.ovn.org/v1
kind: RouteAdvertisements
metadata:
  name: cudn-route-advertisement-workers
spec:
  nodeSelector: 
    matchLabels:
      node-role.kubernetes.io/worker: ""
  frrConfigurationSelector: {}
  networkSelectors:
    - networkSelectionType: ClusterUserDefinedNetworks
      clusterUserDefinedNetworkSelector:
        networkSelector:
          matchLabels:
            infra.aclab.uk/advertise: "true"
  advertisements:
  - "PodNetwork"
{{ end -}}