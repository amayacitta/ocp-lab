## referenced from https://docs.redhat.com/en/documentation/openshift_container_platform/4.21/html/installing_on_vmware_vsphere/installation-config-parameters-vsphere
apiVersion: v1
baseDomain: aclab.uk
metadata:
  name: ocp-region01
compute:
- architecture: amd64
  hyperthreading: Enabled
  name: worker
  platform:
    vsphere: 
      osDisk:
        diskSizeGB: 250
      cpus: 4
      coresPerSocket: 2
      memoryMB: 8192
  replicas: 1
controlPlane:
  architecture: amd64
  hyperthreading: Enabled
  name: master
  platform:
    vsphere: {}
  replicas: 3
platform:
  vsphere:
    apiVIPs:
    - 10.166.109.1    # kubeapi vip backed by keepalived
    ingressVIPs:
    - 10.166.109.2    # haproxy vip backed by keepalived
    diskType: thin
    vcenters:
      - server: vc01.aclab.uk
        user: administrator@vsphere.local
        password: somethingsecure
        datacenters: 
         - home-m01-dc01
    failureDomains:   
      - name: home-fd-01
        zone: home-zone-01
        region: home
        server: vc01.aclab.uk
        topology:
          datacenter: home-m01-dc01
          datastore: /home-m01-dc01/datastore/local-esx01
          computeCluster: /home-m01-dc01/host/home-m01-cl01
          folder: /home-m01-dc01/vm/OCP/Region01
          networks:
            # the first network in the below array becomees the machine network
            # the other two will be used for BGP peering
            - dp-ocp-mgmt-v109
            - dp-ocp-uplink-a-v110
            - dp-ocp-uplink-b-v111
networking:
  networkType: OVNKubernetes
  clusterNetwork:
  - cidr: 10.128.0.0/14       # non-routable for for pods, each host will be allocated a prefix as determined below
    hostPrefix: 23            # default prefix allocation per node, pasted for information only
  serviceNetwork:
  - 172.30.0.0/16             # non-routable for services, default cidr pasted for information only
  machineNetwork:
  - cidr: 10.166.109.0/24        # host network where the nodes will reside, this matches the vmware dp-port group you assign the virtual machines to
  ovnKubernetesConfig:
    ipv4:
      internalJoinSubnet: 100.64.0.0/16   # default internal join subnet pasted for information only
pullSecret: 'changeme'
sshKey: 'ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIAbrOX9HZdwLNHl1vgSvSdfGTXDP2ygof7UXYqsV6cSm home-ocp01'
